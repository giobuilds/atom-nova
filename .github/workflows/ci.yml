name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # macOS — Intel x64 + Apple Silicon arm64
  # ---------------------------------------------------------------------------
  build-and-smoke-macos:
    name: macOS ${{ matrix.arch }} bootstrap, build & smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
          - os: macos-15
            arch: arm64

    steps:
      - uses: actions/checkout@v5

      - name: Use Node 24 (bootstrap host; apm keeps bundled Node 12)
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Use Python 3.12 (setuptools provides distutils for node-gyp)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (distutils for node-gyp)
        run: python -m pip install --upgrade pip setuptools

      - name: Rewrite git ssh URLs to https
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "git://github.com/"

      - name: Cache Electron headers, binaries and package caches
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/node-gyp
            ~/Library/Caches/electron
            ~/.npm
            ~/.atom/.apm
          key: ${{ runner.os }}-${{ matrix.arch }}-node24-py312-electron-${{ hashFiles('package.json', 'package-lock.json', 'script/package.json', 'script/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-node24-py312-electron-
            ${{ runner.os }}-node24-py312-electron-

      - name: Bootstrap
        run: ./script/bootstrap-modern --ci

      - name: Build
        run: ./script/with-modern-env ./script/build --no-bootstrap --compress-artifacts

      - name: Launch smoke test
        run: node script/ci/smoke-test.js

      - name: Upload macOS packages
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: chevron-macos-${{ matrix.arch }}
          path: |
            out/*.zip
            out/*.app
          if-no-files-found: warn

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-state-macos-${{ matrix.arch }}
          path: |
            out/startup.js
            ${{ github.workspace }}/npm-debug.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Linux x64 — deb + tar + rpm
  # ---------------------------------------------------------------------------
  build-and-smoke-linux:
    name: Linux x64 bootstrap, build, smoke & packages
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          # Ubuntu 24.04+ uses t64 transitional ALSA package names
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ALSA_PKG=libasound2t64
          else
            ALSA_PKG=libasound2
          fi
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            libxss-dev \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            "${ALSA_PKG}" \
            libgbm1 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxtst6 \
            xvfb \
            fakeroot \
            dpkg-dev \
            rpm

      - name: Use Node 24 (bootstrap host; apm keeps bundled Node 12)
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Use Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (distutils for node-gyp)
        run: python -m pip install --upgrade pip setuptools

      - name: Rewrite git ssh URLs to https
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "git://github.com/"

      - name: Cache Electron headers, binaries and package caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/node-gyp
            ~/.cache/electron
            ~/.npm
            ~/.atom/.apm
          key: ${{ runner.os }}-${{ runner.arch }}-node24-py312-electron-${{ hashFiles('package.json', 'package-lock.json', 'script/package.json', 'script/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-py312-electron-
            ${{ runner.os }}-node24-py312-electron-

      - name: Bootstrap
        run: ./script/bootstrap-modern --ci

      - name: Build + package (deb, tar, rpm)
        run: |
          set -euo pipefail
          command -v rpmbuild
          ./script/with-modern-env ./script/build --no-bootstrap \
            --create-debian-package \
            --create-rpm-package \
            --compress-artifacts
          # Require deb + tar + rpm artifacts
          ls -la out/*.deb out/*.tar.gz out/*.rpm

      - name: Launch smoke test (Xvfb)
        run: xvfb-run -a node script/ci/smoke-test.js

      - name: Upload Linux packages
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: chevron-linux-${{ runner.arch }}
          path: |
            out/*.deb
            out/*.rpm
            out/*.tar.gz
          if-no-files-found: error

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-state-linux-${{ runner.arch }}
          path: |
            out/startup.js
            ${{ github.workspace }}/npm-debug.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Linux arm64 — deb + tar + rpm (non-blocking if arm runners are scarce)
  # ---------------------------------------------------------------------------
  build-and-smoke-linux-arm64:
    name: Linux arm64 bootstrap, build, smoke & packages
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 150
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ALSA_PKG=libasound2t64
          else
            ALSA_PKG=libasound2
          fi
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            libxss-dev \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            "${ALSA_PKG}" \
            libgbm1 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxtst6 \
            xvfb \
            fakeroot \
            dpkg-dev \
            rpm

      - name: Use Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Use Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools
        run: python -m pip install --upgrade pip setuptools

      - name: Rewrite git ssh URLs to https
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "git://github.com/"

      - name: Cache Electron / npm
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/node-gyp
            ~/.cache/electron
            ~/.npm
            ~/.atom/.apm
          key: ${{ runner.os }}-${{ runner.arch }}-node24-py312-electron-${{ hashFiles('package.json', 'package-lock.json', 'script/package.json', 'script/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-py312-electron-

      - name: Bootstrap
        run: ./script/bootstrap-modern --ci

      - name: Build + package (deb, tar, rpm)
        run: |
          set -euo pipefail
          command -v rpmbuild
          ./script/with-modern-env ./script/build --no-bootstrap \
            --create-debian-package \
            --create-rpm-package \
            --compress-artifacts
          ls -la out/*.deb out/*.tar.gz out/*.rpm

      - name: Launch smoke test (Xvfb)
        run: xvfb-run -a node script/ci/smoke-test.js

      - name: Upload Linux arm64 packages
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: chevron-linux-arm64
          path: |
            out/*.deb
            out/*.rpm
            out/*.tar.gz
          if-no-files-found: error

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-state-linux-arm64
          path: |
            out/startup.js
            ${{ github.workspace }}/npm-debug.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Windows x64 — bootstrap, build, smoke, zip artifact
  # ---------------------------------------------------------------------------
  build-and-smoke-windows:
    name: Windows x64 bootstrap, build, smoke & packages
    runs-on: windows-latest
    timeout-minutes: 150
    defaults:
      run:
        # bootstrap-modern / with-modern-env are bash; Git Bash is on the image.
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Use Node 24 (bootstrap host; apm keeps bundled Node 12)
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Use Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (distutils for node-gyp)
        run: python -m pip install --upgrade pip setuptools

      # Put cl.exe / link.exe on PATH so node-gyp (including old v5) can compile.
      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Rewrite git ssh URLs to https
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "git://github.com/"

      - name: Cache Electron headers, binaries and package caches
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/node-gyp
            ~/AppData/Local/electron
            ~/.npm
            ~/.atom/.apm
          key: ${{ runner.os }}-${{ runner.arch }}-node24-py312-electron-${{ hashFiles('package.json', 'package-lock.json', 'script/package.json', 'script/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node24-py312-electron-
            ${{ runner.os }}-node24-py312-electron-

      - name: Bootstrap
        run: ./script/bootstrap-modern --ci
        env:
          # VS "18" (2026) is on windows-latest; modern node-gyp finds it via PATH.
          # Keep a soft preference for 2022 when present.
          npm_config_msvs_version: '2022'
          GYP_MSVS_VERSION: '2022'

      - name: Build + package (zip)
        run: |
          ./script/with-modern-env ./script/build --no-bootstrap --compress-artifacts
        env:
          npm_config_msvs_version: '2022'
          GYP_MSVS_VERSION: '2022'
      - name: Launch smoke test
        run: node script/ci/smoke-test.js

      - name: Upload Windows packages
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: chevron-windows-${{ runner.arch }}
          path: |
            out/*.zip
          if-no-files-found: warn

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-state-windows-${{ runner.arch }}
          path: |
            out/startup.js
            ${{ github.workspace }}/npm-debug.log
          if-no-files-found: ignore
